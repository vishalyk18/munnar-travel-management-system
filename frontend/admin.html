<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Munnar Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body onload="checkAuth()">

    <header class="hero-header" style="height: 30vh;">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Admin Dashboard</h1>
            <p>Manage User Bookings</p>
        </div>
    </header>

    <div class="login-container" id="loginContainer" style="display: none; max-width: 600px; margin: 40px auto; padding: 20px;">
        <div class="booking-card" style="text-align: center;">
            <h3>Admin Login</h3>
            <p>Please log in to manage bookings.</p>
            <form id="loginForm" onsubmit="adminLogin(event)" style="margin-top: 20px;">
                <div class="form-group" style="text-align: left;">
                    <label for="adminUsername">Username</label>
                    <input type="text" id="adminUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="cta-button" style="margin-top: 15px;">Login to Dashboard</button>
            </form>
        </div>
    </div>

    <div class="main-container" id="dashboardContainer" style="display: none;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Recent Bookings</h2>
            <div>
                <button onclick="adminLogout()" class="cta-button" style="background-color: #d32f2f; width: auto; display: inline-block; margin-right: 15px; padding: 8px 15px;">Logout</button>
                <a href="index.html" class="cta-button" style="width: auto; display: inline-block; padding: 8px 15px;">Back to Home</a>
            </div>
        </div>

        <div class="table-container">
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Persons</th>
                        <th>Date</th>
                        <th>Message</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
            <p id="noBookingsMsg" style="text-align: center; margin-top: 20px; display: none;">No bookings found.</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
